# Install: sudo cp deploy/nginx-travel-agency-api.conf /etc/nginx/sites-available/travel-agency-api.conf
#          sudo ln -sf /etc/nginx/sites-available/travel-agency-api.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d travel-api.bestechvision.com

upstream travel_agency_backend {
    server 127.0.0.1:5011;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name travel-api.bestechvision.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://travel_agency_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
